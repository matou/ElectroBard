# CI (#10): the "green to ship" gate (docs/dev-setup.md#continuous-integration).
# Both sides, every stage — a failing lint/type/test/drift step fails the run.
#
#   Stage      Backend                  Frontend
#   Lint       ruff                     ESLint
#   Typecheck  mypy                     tsc --noEmit
#   Test       pytest (+ Postgres)      vitest component tests
#   Drift      —                        generated client matches OpenAPI (#6/#8)
#
# Runs on PRs (branch work) and on push to main (the post-merge "green on main" bar).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the checkout.
permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Ephemeral Postgres for the integration tests (matches compose's postgres:16
    # and the conftest default creds electrobard/electrobard/electrobard).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: electrobard
          POSTGRES_PASSWORD: electrobard
          POSTGRES_DB: electrobard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U electrobard -d electrobard"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Typecheck (mypy)
        run: uv run mypy .
      - name: Test (pytest + ephemeral Postgres)
        env:
          TEST_DATABASE_URL: postgresql+psycopg://electrobard:electrobard@localhost:5432/electrobard
        run: uv run pytest -q

  frontend:
    name: Frontend — lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test

  api-drift:
    name: API client drift gate
    runs-on: ubuntu-latest
    # The drift check regenerates the client from the live backend schema, so it
    # needs both toolchains: uv/Python (export the OpenAPI schema) and Node (openapi-ts).
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Check generated client matches OpenAPI
        run: npm run check:api
        working-directory: frontend
